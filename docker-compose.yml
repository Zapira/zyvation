services:
    app:
        container_name: e-zyvation
        build:
            context: .
            dockerfile: Dockerfile
        command: "php artisan serve --host=0.0.0.0"
        volumes:
            - .:/app
        ports:
            - 8888:8000
        depends_on:
            - database
            - node

    database:
        container_name: e-zyvation-database
        image: mysql:8.0
        volumes:
            - dbdata:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_DATABASE: ${DB_DATABASE}
        ports:
            - 33061:3306

    node:
        container_name: e-zyvation-node
        image: node:22-alpine
        working_dir: /app
        volumes:
            - .:/app
        ports:
            - 5173:5173
        command: sh -c "npm install && npm run dev -- --host"


volumes:
    dbdata:
    node_modules: